<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로그인 — SEA-cret Guard Archi</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<aside class="depth-gauge" aria-hidden="true">
  <div class="unit">DEPTH (M)</div>
  <div class="track">
    <div class="tick" style="top:0%"><span>0</span></div>
    <div class="tick" style="top:25%"><span>10</span></div>
    <div class="tick" style="top:50%"><span>20</span></div>
    <div class="tick" style="top:75%"><span>30</span></div>
    <div class="tick" style="top:100%"><span>40</span></div>
    <div class="marker" style="top:0%"></div>
  </div>
</aside>

<div class="wrap">
  <header class="stamp-header">
    <div class="seal">SGA</div>
    <div class="id">FILE NO. 0119 · ACCESS TERMINAL</div>
    <nav>
      <a href="index.html">홈</a>
      <a href="signup.html">등록</a>
    </nav>
  </header>

  <h2 style="font-size:2rem;">잠수 인증</h2>
  <p class="lede" style="margin-bottom:32px;">
    등록된 요원 코드와 암호로 로그인하고 잠수를 시작하세요.
  </p>

  <div class="panel" style="max-width:420px;">
    <div class="msg error" id="login-msg" role="alert"></div>
    <form id="login-form">
      <div class="field">
        <label for="username">요원 코드</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">암호</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <button type="submit">로그인</button>
    </form>
  </div>

  <p class="foot-note">
    아직 등록하지 않았다면 <a href="signup.html">요원 등록</a> 페이지로 이동하세요.
  </p>
</div>

<script src="js/auth.js"></script>
<script>
  document.getElementById("login-form").addEventListener("submit", function (e) {
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const msg = document.getElementById("login-msg");

    const result = agLogin(username, password);
    msg.textContent = result.message;
    msg.className = "msg " + (result.ok ? "ok" : "error") + " show";

    if (result.ok) {
      setTimeout(() => (window.location.href = "game.html"), 700);
    }
  });
</script>
</body>
</html>
