<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>중부 해양경찰청 — 아치 카드 짝맞추기</title>
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/game-common.css" />
<link rel="stylesheet" href="css/jungbu.css" />
</head>
<body>
<div class="wrap">
  <div class="game-header">
    <a class="back" href="index.html">← 지도로</a>
    <span class="log-chip" id="log-chip"></span>
  </div>

  <div class="mission-title">
    <div class="region-tag">중부 해양경찰청</div>
    <h1>아치 카드 짝맞추기</h1>
    <p>색깔이 다른 6가지 아치 카드가 두 장씩, 총 12장 섞여 있어요.
      같은 색 카드 두 장을 찾아 짝을 맞춰보세요!</p>
  </div>

  <div class="hud">
    <div class="stat"><div class="label">맞춘 쌍</div><div class="value" id="pairs-value">0</div></div>
    <div class="stat"><div class="label">시도 횟수</div><div class="value" id="tries-value">0</div></div>
  </div>

  <div class="game-stage">
    <div class="start-panel" id="start-panel">
      <img src="assets/archi.png" alt="아치" style="width:90px;" />
      <p>카드를 두 장씩 뒤집어서 같은 색 아치를 찾아보세요.</p>
      <button class="btn" id="start-btn">카드 뒤집기 시작</button>
    </div>
    <div class="card-grid" id="card-grid" style="display:none;"></div>
  </div>
</div>

<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <img src="assets/archi.png" alt="아치" />
    <h2 id="result-title"></h2>
    <p id="result-desc"></p>
    <div class="btn-row">
      <button class="btn" id="retry-btn">다시 하기</button>
      <a class="btn ghost" href="index.html">지도로 돌아가기</a>
    </div>
  </div>
</div>

<script src="js/progress.js"></script>
<script>
  document.getElementById("log-chip").textContent = amCompletedCount() + " / 5 완료";
</script>
<script src="js/jungbu.js"></script>
</body>
</html>
