<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>요원 등록 — SEA-cret Guard Archi</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<aside class="depth-gauge" aria-hidden="true">
  <div class="unit">DEPTH (M)</div>
  <div class="track">
    <div class="tick" style="top:0%"><span>0</span></div>
    <div class="tick" style="top:25%"><span>10</span></div>
    <div class="tick" style="top:50%"><span>20</span></div>
    <div class="tick" style="top:75%"><span>30</span></div>
    <div class="tick" style="top:100%"><span>40</span></div>
    <div class="marker" style="top:0%"></div>
  </div>
</aside>

<div class="wrap">
  <header class="stamp-header">
    <div class="seal">SGA</div>
    <div class="id">FILE NO. 0119 · AGENT REGISTRATION</div>
    <nav>
      <a href="index.html">홈</a>
      <a href="login.html">로그인</a>
    </nav>
  </header>

  <h2 style="font-size:2rem;">요원 등록</h2>
  <p class="lede" style="margin-bottom:32px;">
    요원 코드와 암호를 정하세요. 이 정보는 이 브라우저에만 저장됩니다.
  </p>

  <div class="panel" style="max-width:420px;">
    <div class="msg error" id="signup-msg" role="alert"></div>
    <form id="signup-form">
      <div class="field">
        <label for="username">요원 코드 (아이디)</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">암호</label>
        <input type="password" id="password" autocomplete="new-password" required />
      </div>
      <div class="field">
        <label for="password2">암호 확인</label>
        <input type="password" id="password2" autocomplete="new-password" required />
      </div>
      <button type="submit">등록하기</button>
    </form>
  </div>

  <p class="foot-note">
    이미 등록했다면 <a href="login.html">로그인 페이지</a>로 이동하세요.
  </p>
</div>

<script src="js/auth.js"></script>
<script>
  document.getElementById("signup-form").addEventListener("submit", function (e) {
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const password2 = document.getElementById("password2").value;
    const msg = document.getElementById("signup-msg");

    if (password !== password2) {
      msg.textContent = "암호가 서로 일치하지 않습니다.";
      msg.className = "msg error show";
      return;
    }

    const result = agSignup(username, password);
    msg.textContent = result.message;
    msg.className = "msg " + (result.ok ? "ok" : "error") + " show";

    if (result.ok) {
      setTimeout(() => (window.location.href = "login.html"), 900);
    }
  });
</script>
</body>
</html>
